<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סיום הבקשה וביצוע התרומה</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #2f2417;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 14px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: linear-gradient(180deg, #fbf6e9 0%, #f3e7d0 100%);
      border: 2px solid #d9c08a;
      border-radius: 26px;
      box-shadow: 0 10px 32px rgba(0,0,0,.28);
      padding: 22px 16px 24px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      color: #7a531a;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.35;
    }

    .intro {
      color: #7a5837;
      line-height: 1.8;
      font-size: 16px;
      margin-bottom: 18px;
      font-weight: 700;
    }

    .blessing-box {
      background: #fffdf8;
      border: 1px solid #e0c892;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 18px;
      color: #6b4b1e;
      line-height: 1.8;
      font-size: 15px;
    }

    .pay-title {
      font-weight: bold;
      color: #7a531a;
      margin: 16px 0 10px;
      font-size: 18px;
    }

    .pay-btn {
      display: block;
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      margin: 10px 0;
      font-size: 17px;
      font-weight: bold;
      text-decoration: none;
      text-align: center;
      background: #7a4c1f;
      color: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,.2);
    }

    .pay-btn:hover {
      filter: brightness(1.05);
    }

    .final-note {
      margin-top: 18px;
      color: #7a5837;
      line-height: 1.8;
      font-size: 14px;
      font-weight: 700;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>✨ סיום הבקשה</h1>

    <div class="intro">
      הפרטים נשלחו בהצלחה 🙏<br>
      כעת ניתן להשלים את התהליך.
    </div>

    <div class="blessing-box">
      תודה על השותפות בזיכוי הרבים.<br>
      כל תמיכה עוזרת להמשיך להפיץ תורה, חיזוק וברכה לעוד יהודים.
    </div>

    <div class="pay-title">בחרו דרך לתרומה:</div>

    <a class="pay-btn"
       href="https://www.bitpay.co.il/app/me/4A7D7360-AF51-7846-5E67-60FACACD37C54857?v=2"
       target="_blank"
       rel="noopener noreferrer">
      תשלום בביט
    </a>

    <a class="pay-btn"
       href="https://3ydbh.app.link/c9hSuB5Xq1b?_p=c11331dc9a006ceee61490fceeb4"
       target="_blank"
       rel="noopener noreferrer">
      תשלום בפייבוקס
    </a>

    <a class="pay-btn"
       href="https://paypal.me/RonenTorah"
       target="_blank"
       rel="noopener noreferrer">
      תשלום בפייפאל
    </a>

    <div class="final-note">
      לאחר ביצוע התרומה — הבקשה תטופל ותיכנס בעזרת ה׳ לעלייה הקרובה.
    </div>
  </div>

</body>
</html>
