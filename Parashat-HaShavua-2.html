<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>אישור הבקשה</title>
  <style>
    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#111;
      color:#2f2417;
    }

    .page{
      max-width:980px;
      margin:0 auto;
      padding:12px 10px 28px;
    }

    .card{
      background:linear-gradient(180deg,#fbf6e9 0%,#f3e7d0 100%);
      border:2px solid #d9c08a;
      border-radius:24px;
      box-shadow:0 8px 28px rgba(0,0,0,.24);
      padding:16px 12px 20px;
    }

    h1,h2,h3{
      margin:0 0 10px;
      text-align:center;
      color:#7a531a;
      line-height:1.35;
    }

    h1{
      font-size:clamp(22px,4vw,36px);
    }

    .intro{
      text-align:center;
      color:#7a5837;
      line-height:1.7;
      font-size:clamp(13px,2vw,18px);
      margin-bottom:18px;
    }

    .summary-top{
      background:#fff8eb;
      border:1px solid #e4cf9c;
      border-radius:18px;
      padding:14px;
      margin-bottom:16px;
      text-align:center;
      color:#6b4b1e;
      font-size:clamp(14px,2vw,20px);
      line-height:1.7;
      font-weight:bold;
    }

    .req-item{
      background:#fffdf8;
      border:1px solid #e0c892;
      border-radius:18px;
      padding:12px;
      margin-bottom:14px;
    }

    .req-title{
      font-weight:bold;
      color:#7a531a;
      margin-bottom:10px;
      font-size:clamp(15px,2vw,20px);
      text-align:center;
    }

    .line{
      margin-bottom:7px;
      line-height:1.7;
      color:#4b3315;
      font-size:clamp(14px,1.8vw,17px);
      word-break:break-word;
      white-space:pre-wrap;
    }

    .total-box{
      margin-top:10px;
      background:#fff3dd;
      border:2px solid #d4b16b;
      border-radius:18px;
      padding:14px;
      text-align:center;
      color:#7a531a;
      font-size:clamp(16px,2.2vw,24px);
      font-weight:bold;
      line-height:1.6;
    }

    .next-step-box{
      margin-top:20px;
      background:#fff8eb;
      border:1px solid #e4cf9c;
      border-radius:20px;
      padding:16px 12px;
    }

    .next-step-text{
      text-align:center;
      color:#6b4b1e;
      line-height:1.7;
      font-size:clamp(14px,1.8vw,17px);
      margin-bottom:14px;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
      margin-top:18px;
    }

    .main-btn,
    .back-btn{
      border:none;
      border-radius:16px;
      padding:12px 18px;
      font-size:clamp(14px,1.8vw,18px);
      font-weight:bold;
      cursor:pointer;
      text-decoration:none;
      text-align:center;
      display:inline-block;
    }

    .main-btn{
      background:#7a4c1f;
      color:#fff;
      box-shadow:0 4px 10px rgba(0,0,0,.2);
    }

    .back-btn{
      background:#efe0bf;
      color:#6b4b1e;
      border:2px solid #d2b173;
    }

    .error-box{
      display:none;
      margin-top:14px;
      background:#ffefef;
      color:#b00020;
      border:2px solid #d64545;
      border-radius:14px;
      padding:10px;
      text-align:center;
      line-height:1.7;
      font-weight:bold;
      font-size:14px;
    }

    .empty-box{
      text-align:center;
      background:#fff8eb;
      border:1px solid #e4cf9c;
      border-radius:18px;
      padding:20px 14px;
      color:#7a5837;
      line-height:1.8;
      font-size:clamp(14px,2vw,18px);
    }

    .note{
      text-align:center;
      margin-top:10px;
      color:#c62828;
      font-size:clamp(12px,1.6vw,14px);
      font-weight:bold;
      line-height:1.7;
    }

    @media (max-width:640px){
      .page{
        padding:8px 8px 20px;
      }

      .card{
        border-radius:18px;
        padding:12px 10px 16px;
      }

      h1{
        font-size:24px;
      }

      .intro{
        font-size:13px;
        margin-bottom:14px;
      }

      .summary-top{
        font-size:14px;
        padding:12px;
      }

      .req-item{
        padding:10px;
        border-radius:14px;
      }

      .req-title{
        font-size:15px;
      }

      .line{
        font-size:14px;
      }

      .total-box{
        font-size:15px;
        padding:12px;
      }

      .next-step-text{
        font-size:13px;
      }

      .main-btn,
      .back-btn{
        width:100%;
        font-size:14px;
        padding:11px 14px;
      }

      .note{
        font-size:12px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>אישור הבקשה</h1>

      <div class="intro">
        לפניכם סיכום מלא של כל הבקשות שמולאו.<br>
        אנא עברו על הנתונים, ולאחר מכן המשיכו לדף הסופי.
      </div>

      <div id="errorBox" class="error-box"></div>
      <div id="contentArea"></div>
    </div>
  </div>

  <script>
    const NEXT_PAGE_URL = 'Parashat-HaShavua-3.html';
    const STORAGE_KEY = 'bravo_order_payload';
    const BACK_URL = 'index.html';

    function decodePayloadFromHash() {
      try {
        const hash = window.location.hash || '';
        const prefix = '#data=';
        if (!hash.startsWith(prefix)) return null;

        const encoded = hash.substring(prefix.length);
        const json = decodeURIComponent(escape(atob(decodeURIComponent(encoded))));
        return JSON.parse(json);
      } catch (err) {
        return null;
      }
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function saveOrderData() {
      const payload = decodePayloadFromHash() || {};
      const requests = Array.isArray(payload.requests) ? payload.requests : [];
      const errorBox = document.getElementById('errorBox');

      errorBox.style.display = 'none';
      errorBox.textContent = '';

      if (!requests.length) {
        errorBox.textContent = 'לא נמצאו נתוני הזמנה לשמירה.';
        errorBox.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return false;
      }

      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      } catch (err) {
        errorBox.textContent = 'לא ניתן היה לשמור את נתוני ההזמנה במכשיר זה.';
        errorBox.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return false;
      }

      return true;
    }

    function goToNextPage(event) {
      if (!saveOrderData()) {
        event.preventDefault();
        return false;
      }
      return true;
    }

    function renderEmptyState() {
      document.getElementById('contentArea').innerHTML = `
        <div class="empty-box">
          לא התקבלו נתונים מהדף הראשון.<br>
          יש לחזור לדף הבקשה, למלא את הפרטים, ואז ללחוץ על "אישור הבקשה".
          <div class="actions" style="margin-top:18px;">
            <a href="${BACK_URL}" class="back-btn">חזרה לדף הקודם</a>
          </div>
        </div>
      `;
    }

    function renderSummary(payload) {
      const requests = Array.isArray(payload.requests) ? payload.requests : [];
      const totalAmount = Number(payload.totalAmount || 0);

      let requestsHtml = '';
      requests.forEach(function(req, index) {
        requestsHtml += `
          <div class="req-item">
            <div class="req-title">בקשה מס׳ ${index + 1} מתוך ${requests.length}</div>
            <div class="line"><strong>השם שיופיע:</strong> ${escapeHtml(req.name || 'בעילום שם')}</div>
            <div class="line"><strong>סוג הבקשה:</strong> ${escapeHtml(req.type || '')}</div>
            <div class="line"><strong>הנוסח שיופיע בסרטון:</strong> ${escapeHtml(req.text || '')}</div>
            <div class="line"><strong>שם מלא של המבקש:</strong> ${escapeHtml(req.requesterName || '')}</div>
            <div class="line"><strong>אימייל ליצירת קשר:</strong> ${escapeHtml(req.email || '')}</div>
            <div class="line"><strong>סכום התרומה שנבחר:</strong> ${escapeHtml(req.amount || '')} ש״ח</div>
          </div>
        `;
      });

      document.getElementById('contentArea').innerHTML = `
        <div class="summary-top">
          מספר בקשות: ${requests.length}
        </div>

        ${requestsHtml}

        <div class="total-box">
          סה״כ סכום לתשלום: ${totalAmount} ש״ח
        </div>

        <div class="next-step-box">
          <h3>השלב הבא</h3>
          <div class="next-step-text">
            לאחר שבדקתם שהפרטים נכונים,<br>
            לחצו על הכפתור למטה כדי לעבור לדף הסופי.
          </div>

          <div class="actions">
            <a href="${NEXT_PAGE_URL}" class="main-btn" onclick="return goToNextPage(event)">להמשך לדף הסופי</a>
            <a href="${BACK_URL}" class="back-btn">חזרה לדף הקודם</a>
          </div>

          <div class="note">
            הנתונים שהופיעו בעמוד זה יישמרו במכשיר לפני המעבר לדף הבא.
          </div>
        </div>
      `;
    }

    const payload = decodePayloadFromHash();

    if (!payload || !payload.requests || !payload.requests.length) {
      renderEmptyState();
    } else {
      renderSummary(payload);
    }
  </script>
</body>
</html>
