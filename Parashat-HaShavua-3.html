<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תשלום סופי</title>
  <style>
    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#111;
      color:#2f2417;
    }

    .page{
      max-width:980px;
      margin:0 auto;
      padding:12px 10px 28px;
    }

    .card{
      background:linear-gradient(180deg,#fbf6e9 0%,#f3e7d0 100%);
      border:2px solid #d9c08a;
      border-radius:24px;
      box-shadow:0 8px 28px rgba(0,0,0,.24);
      padding:16px 12px 20px;
    }

    h1,h2,h3{
      margin:0 0 10px;
      text-align:center;
      color:#7a531a;
      line-height:1.35;
    }

    h1{
      font-size:clamp(22px,4vw,36px);
    }

    .intro{
      text-align:center;
      color:#7a5837;
      line-height:1.7;
      font-size:clamp(13px,2vw,18px);
      margin-bottom:18px;
    }

    .section{
      background:#fff8eb;
      border:1px solid #e4cf9c;
      border-radius:18px;
      padding:14px;
      margin-top:16px;
    }

    .summary-top{
      background:#fffdf8;
      border:1px solid #e0c892;
      border-radius:18px;
      padding:14px;
      margin-bottom:14px;
      text-align:center;
      color:#6b4b1e;
      font-size:clamp(14px,2vw,20px);
      line-height:1.7;
      font-weight:bold;
    }

    .req-item{
      background:#fffdf8;
      border:1px solid #e0c892;
      border-radius:18px;
      padding:12px;
      margin-bottom:14px;
    }

    .req-title{
      font-weight:bold;
      color:#7a531a;
      margin-bottom:10px;
      font-size:clamp(15px,2vw,20px);
      text-align:center;
    }

    .line{
      margin-bottom:7px;
      line-height:1.7;
      color:#4b3315;
      font-size:clamp(14px,1.8vw,17px);
      word-break:break-word;
      white-space:pre-wrap;
    }

    .total-box{
      margin-top:10px;
      background:#fff3dd;
      border:2px solid #d4b16b;
      border-radius:18px;
      padding:14px;
      text-align:center;
      color:#7a531a;
      font-size:clamp(16px,2.2vw,24px);
      font-weight:bold;
      line-height:1.6;
    }

    .pay-links-box{
      margin-top:14px;
      background:#fffdf8;
      border:1px solid #e0c892;
      border-radius:18px;
      padding:14px 12px;
    }

    .pay-links-title{
      text-align:center;
      color:#7a531a;
      font-size:clamp(15px,2vw,20px);
      font-weight:bold;
      margin-bottom:10px;
    }

    .pay-links-text{
      text-align:center;
      color:#6b4b1e;
      line-height:1.7;
      font-size:clamp(13px,1.8vw,16px);
      margin-bottom:12px;
    }

    .pay-links-actions{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
    }

    .pay-btn{
      border:none;
      border-radius:16px;
      padding:12px 18px;
      font-size:clamp(14px,1.8vw,18px);
      font-weight:bold;
      cursor:pointer;
      text-decoration:none;
      text-align:center;
      display:inline-block;
      background:#7a4c1f;
      color:#fff;
      box-shadow:0 4px 10px rgba(0,0,0,.2);
    }

    .payment-box{
      margin-top:18px;
      background:#fff8eb;
      border:1px solid #e4cf9c;
      border-radius:20px;
      padding:16px 12px;
    }

    .payment-text{
      text-align:center;
      color:#6b4b1e;
      line-height:1.7;
      font-size:clamp(14px,1.8vw,17px);
      margin-bottom:14px;
      white-space:pre-line;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
      margin-top:18px;
    }

    .main-btn,
    .back-btn{
      border:none;
      border-radius:16px;
      padding:12px 18px;
      font-size:clamp(14px,1.8vw,18px);
      font-weight:bold;
      cursor:pointer;
      text-decoration:none;
      text-align:center;
      display:inline-block;
    }

    .main-btn{
      background:#7a4c1f;
      color:#fff;
      box-shadow:0 4px 10px rgba(0,0,0,.2);
    }

    .back-btn{
      background:#efe0bf;
      color:#6b4b1e;
      border:2px solid #d2b173;
    }

    .note{
      text-align:center;
      margin-top:10px;
      color:#7a5837;
      font-size:clamp(12px,1.6vw,15px);
      line-height:1.7;
    }

    .error-box{
      display:none;
      margin-top:14px;
      background:#ffefef;
      color:#b00020;
      border:2px solid #d64545;
      border-radius:14px;
      padding:10px;
      text-align:center;
      line-height:1.7;
      font-weight:bold;
      white-space:pre-line;
      font-size:14px;
    }

    .empty-box{
      text-align:center;
      background:#fff8eb;
      border:1px solid #e4cf9c;
      border-radius:18px;
      padding:20px 14px;
      color:#7a5837;
      line-height:1.8;
      font-size:clamp(14px,2vw,18px);
    }

    @media (max-width:640px){
      .page{
        padding:8px 8px 20px;
      }

      .card{
        border-radius:18px;
        padding:12px 10px 16px;
      }

      h1{
        font-size:24px;
      }

      .intro{
        font-size:13px;
        margin-bottom:14px;
      }

      .summary-top{
        font-size:14px;
        padding:12px;
      }

      .req-item{
        padding:10px;
        border-radius:14px;
      }

      .req-title{
        font-size:15px;
      }

      .line{
        font-size:14px;
      }

      .total-box{
        font-size:15px;
        padding:12px;
      }

      .pay-links-title{
        font-size:15px;
      }

      .pay-links-text{
        font-size:13px;
      }

      .payment-text{
        font-size:13px;
      }

      .pay-btn,
      .main-btn,
      .back-btn{
        width:100%;
        font-size:14px;
        padding:11px 14px;
      }

      .note{
        font-size:12px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>סיכום ההזמנה</h1>

      <div class="intro">
        לפניכם הסיכום הסופי לפני ביצוע התשלום ושליחת המייל.<br>
        אנא ודאו שכל הפרטים נכונים.
      </div>

      <div id="errorBox" class="error-box"></div>
      <div id="contentArea"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'bravo_order_payload';
    const BACK_URL = 'Parashat-HaShavua-2.html';

    /* עדכן כאן לכתובת המייל שאליה אתה רוצה שהבקשה תישלח */
    const DESTINATION_EMAIL = 'prsthsbw9@gmail.com';

    /* עדכן כאן את קישורי התשלום שלך */
    const BIT_URL = '';
    const PAYBOX_URL = '';
    const PAYPAL_URL = '';

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getPayloadFromStorage() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (err) {
        return null;
      }
    }

    function showError(message) {
      const errorBox = document.getElementById('errorBox');
      errorBox.textContent = message;
      errorBox.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function getPrimaryEmail(requests) {
      for (const req of requests) {
        if (req && req.email && String(req.email).trim()) {
          return String(req.email).trim();
        }
      }
      return '';
    }

    function buildRequestsHtml(requests) {
      let requestsHtml = '';

      requests.forEach(function(req, index) {
        requestsHtml += `
          <div class="req-item">
            <div class="req-title">בקשה מס׳ ${index + 1}</div>
            <div class="line"><strong>סוג הבקשה:</strong> ${escapeHtml(req.type || '')}</div>
            <div class="line"><strong>הנוסח שיופיע בסרטון:</strong> ${escapeHtml(req.text || '')}</div>
            <div class="line"><strong>שם מלא של המבקש:</strong> ${escapeHtml(req.requesterName || '')}</div>
            <div class="line"><strong>אימייל ליצירת קשר:</strong> ${escapeHtml(req.email || '')}</div>
            <div class="line"><strong>סכום התרומה שנבחר:</strong> ${escapeHtml(req.amount || '')} ש״ח</div>
          </div>
        `;
      });

      return requestsHtml;
    }

    function buildMailBody(payload) {
      const requests = Array.isArray(payload.requests) ? payload.requests : [];
      const totalAmount = Number(payload.totalAmount || 0);
      const primaryEmail = getPrimaryEmail(requests);

      let body = '';
      body += 'שלום, ברצוני להוסיף שם לעליה הבאה שתהיה' + '\n\n';

      body += 'אימייל ממלא הבקשה:' + '\n';
      body += (primaryEmail || 'לא הוזן') + '\n\n';

      body += 'סה"כ לתשלום:' + '\n';
      body += totalAmount + ' ש"ח' + '\n\n';

      body += 'פירוט הבקשות:' + '\n\n';

      requests.forEach(function(req, index) {
        body += 'בקשה מס\' ' + (index + 1) + ':' + '\n';
        body += 'סוג הבקשה: ' + (req.type || '') + '\n';
        body += 'הנוסח שיופיע בסרטון:' + '\n';
        body += (req.text || '') + '\n';
        body += 'שם מלא של המבקש: ' + (req.requesterName || '') + '\n';
        body += 'אימייל ליצירת קשר: ' + (req.email || '') + '\n';
        body += 'סכום התרומה שנבחר: ' + (req.amount || 0) + ' ש"ח' + '\n\n';
      });

      body += 'לצירוף תמונה יש ללחוץ במייל הזה:' + '\n';
      body += '1. על הקישור ולאחר מכן להעלות תמונה מהגלריה או ממקום אחר בנייד' + '\n';
      body += 'הערה: במידה ויש יותר משם אחד יש לרשום פה במייל מתחת לכל תמונה את השם שנדע לאן לשייך את התמונה.' + '\n';
      body += '2. באותה הדרך לבסוף יש לצרף את אישור התשלום מהנייד.' + '\n';
      body += '3. לבסוף יש ללחוץ שלח.' + '\n';
      body += '4. הערה: במידה ונתקלתם בבעיה כלשהי אפשר לרשום פה במייל את הבעיה וללחוץ שלח ואנחנו נעזור לכם' + '\n';
      body += 'תודה ובהצלחה.' + '\n';

      return body;
    }

    function openMailClient() {
      const payload = getPayloadFromStorage();

      if (!payload || !payload.requests || !payload.requests.length) {
        showError('לא נמצאו נתוני הזמנה. יש לחזור לדף הקודם ולבדוק שהפרטים נשמרו.');
        return;
      }

      const subject = 'בקשה להוספת שם - פרשת השבוע';
      const body = buildMailBody(payload);

      const mailtoUrl =
        'mailto:' + encodeURIComponent(DESTINATION_EMAIL) +
        '?subject=' + encodeURIComponent(subject) +
        '&body=' + encodeURIComponent(body);

      window.location.href = mailtoUrl;
    }

    function renderEmptyState() {
      document.getElementById('contentArea').innerHTML = `
        <div class="empty-box">
          לא נמצאו נתוני הזמנה שמורים.<br>
          יש לחזור לדף הקודם, לבדוק את הפרטים, ואז להמשיך שוב.
          <div class="actions" style="margin-top:18px;">
            <a href="${BACK_URL}" class="back-btn">חזרה לדף הקודם</a>
          </div>
        </div>
      `;
    }

    function renderPage(payload) {
      const requests = Array.isArray(payload.requests) ? payload.requests : [];
      const totalAmount = Number(payload.totalAmount || 0);

      document.getElementById('contentArea').innerHTML = `
        <div class="section">
          <div class="summary-top">
            מספר בקשות: ${requests.length}
          </div>

          ${buildRequestsHtml(requests)}

          <div class="total-box">
            סה״כ סכום לתשלום: ${totalAmount} ש״ח
          </div>

          <div class="pay-links-box">
  <div class="pay-links-title">לחצני תשלום</div>
  <div class="pay-links-text">
    לאחר בחירת אמצעי התשלום וביצוע התשלום, יש לחזור לכאן ולפתוח את המייל.
  </div>
  <div class="pay-links-actions">
    <a href="https://www.bitpay.co.il/app/me/4A7D7360-AF51-7846-5E67-60FACACD37C54857?v=2" target="_blank" rel="noopener noreferrer" class="pay-btn">תשלום בביט</a>
    <a href="https://3ydbh.app.link/c9hSuB5Xq1b?_p=c11331dc9a006ceee61490fceeb4" target="_blank" rel="noopener noreferrer" class="pay-btn">תשלום בפייבוקס</a>
    <a href="https://paypal.me/RonenTorah" target="_blank" rel="noopener noreferrer" class="pay-btn">תשלום בפייפאל</a>
  </div>
</div>

        <div class="payment-box">
          <h3>ביצוע תשלום</h3>
          <div class="payment-text">
            לאחר ביצוע התשלום, לחצו על הכפתור למטה כדי לפתוח את המייל,
            לשלוח את פרטי הבקשה, ולצרף תמונה ואישור תשלום לפי הצורך.
          </div>

          <div class="actions">
            <button type="button" class="main-btn" onclick="openMailClient()">פתיחת המייל ושליחת הבקשה</button>
            <a href="${BACK_URL}" class="back-btn">חזרה לדף הקודם</a>
          </div>

          <div class="note">
            יש לוודא שבמכשיר מותקנת אפליקציית מייל זמינה לפתיחת טיוטת ההודעה.
          </div>
        </div>
      `;
    }

    const payload = getPayloadFromStorage();

    if (!payload || !payload.requests || !payload.requests.length) {
      renderEmptyState();
    } else {
      renderPage(payload);
    }
  </script>
</body>
</html>
